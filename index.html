<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة الهدايا الذكية - الحفظ التلقائي</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a1a2e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 20px;
            color: #e94560;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            max-width: 1200px;
            width: 100%;
        }

        /* قسم السبنر */
        .spinner-section {
            flex: 1;
            min-width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .wheel-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin-bottom: 20px;
        }

        /* المؤشر */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #e94560;
            z-index: 10;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.25, 1);
        }

        .spin-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
            transition: 0.2s;
        }

        .spin-btn:hover {
            background: #ff5e7e;
            transform: scale(1.05);
        }

        .spin-btn:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* لوحة التحكم */
        .control-panel {
            flex: 1;
            min-width: 350px;
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .control-panel h2 {
            margin-bottom: 15px;
            font-size: 20px;
            border-bottom: 2px solid #0f3460;
            padding-bottom: 10px;
        }

        .gift-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        input {
            background: #1a1a2e;
            border: 1px solid #0f3460;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
        }

        input[type="text"] { flex: 2; }
        input[type="number"] { flex: 1; text-align: center; }

        .remove-btn {
            background: #8b0000;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        .add-btn, .update-btn {
            background: #0f3460;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
        }

        .add-btn:hover { background: #1f4068; }
        .update-btn { background: #228b22; margin-top: 5px; }
        .update-btn:hover { background: #2e8b57; }

        .total-percentage {
            margin-top: 15px;
            font-size: 14px;
            text-align: left;
            color: #ffaa00;
        }

        /* النتيجة */
        #result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #00fff0;
            min-height: 35px;
        }
    </style>
</head>
<body>

    <h1>عجلة الهدايا التفاعلية</h1>

    <div class="container">
        
        <div class="spinner-section">
            <div class="wheel-container">
                <div class="pointer"></div>
                <canvas id="wheel" width="400" height="400"></canvas>
            </div>
            <button class="spin-btn" id="spinBtn" onclick="spin()">إبدأ السحب!</button>
            <div id="result"></div>
        </div>

        <div class="control-panel">
            <h2>إعدادات الهدايا والنسب</h2>
            <div id="giftsContainer">
                </div>
            <button class="add-btn" onclick="addGiftRow()">+ إضافة هدية جديدة</button>
            <button class="update-btn" onclick="updateWheel()">تحديث وتطبيق التعديلات</button>
            <div class="total-percentage" id="totalCheck">مجموع النسب الحالي: 100%</div>
        </div>

    </div>

    <script>
        // البيانات الافتراضية في حال كانت هذه أول مرة يفتح فيها المستخدم الموقع
        const defaultGifts = [
            { text: "خصم 10%", probability: 50, color: "#1f4068" },
            { text: "توصيل مجاني", probability: 30, color: "#e94560" },
            { text: "هدية مجانية", probability: 15, color: "#0f3460" },
            { text: "الجائزة الكبرى", probability: 5, color: "#ffaa00" }
        ];

        // ميزة الحفظ: استدعاء البيانات المخزنة مسبقاً أو تحميل الافتراضية
        let gifts = JSON.parse(localStorage.getItem('wheelGifts')) || defaultGifts;

        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        let currentRotation = 0;
        let isSpinning = false;

        function getRandomColor() {
            const colors = ["#1f4068", "#e94560", "#0f3460", "#ffaa00", "#4e0e2e", "#16a085", "#2980b9", "#8e44ad"];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // رسم العجلة بناءً على البيانات المتوفرة
        function drawWheel() {
            const totalProb = gifts.reduce((sum, g) => sum + g.probability, 0);
            if (totalProb === 0) return;

            let startAngle = 0;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            gifts.forEach((gift) => {
                const sliceAngle = (gift.probability / totalProb) * 2 * Math.PI;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
                ctx.closePath();
                ctx.fillStyle = gift.color;
                ctx.fill();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 14px Segoe UI";
                ctx.textAlign = "right";
                ctx.fillText(gift.text, radius - 20, 5);
                ctx.restore();

                startAngle += sliceAngle;
            });
        }

        // عرض المدخلات في لوحة التحكم
        function renderControlPanel() {
            const container = document.getElementById("giftsContainer");
            container.innerHTML = "";

            gifts.forEach((gift, index) => {
                const row = document.createElement("div");
                row.className = "gift-row";
                row.innerHTML = `
                    <input type="text" value="${gift.text}" id="text-${index}" placeholder="اسم الهدية">
                    <input type="number" value="${gift.probability}" id="prob-${index}" min="0" max="100" placeholder="%">
                    <button class="remove-btn" onclick="removeGift(${index})">حذف</button>
                `;
                container.appendChild(row);
            });
            checkTotalPercentage();
        }

        function addGiftRow() {
            gifts.push({ text: "هدية جديدة", probability: 0, color: getRandomColor() });
            renderControlPanel();
        }

        function removeGift(index) {
            if(gifts.length > 1) {
                gifts.splice(index, 1);
                renderControlPanel();
            } else {
                alert("يجب أن تبقي على هدية واحدة على الأقل!");
            }
        }

        function checkTotalPercentage() {
            let total = 0;
            gifts.forEach((_, index) => {
                const probVal = parseFloat(document.getElementById(`prob-${index}`)?.value) || 0;
                total += probVal;
            });
            
            const totalCheckEl = document.getElementById("totalCheck");
            totalCheckEl.innerText = `مجموع النسب الحالي: ${total}%`;
            
            if (total !== 100) {
                totalCheckEl.style.color = "#ff5e7e";
            } else {
                totalCheckEl.style.color = "#00fff0";
            }
            return total;
        }

        // حفظ التعديلات في الذاكرة الدائمة وتحديث الرسم
        function updateWheel() {
            const total = checkTotalPercentage();
            if (total !== 100) {
                alert(`تنبيه: مجموع النسب يجب أن يكون 100% تماماً. المجموع الحالي هو ${total}%`);
                return;
            }

            gifts.forEach((gift, index) => {
                gift.text = document.getElementById(`text-${index}`).value;
                gift.probability = parseFloat(document.getElementById(`prob-${index}`).value) || 0;
            });

            // حفظ مصفوفة الهدايا في متصفح المستخدم
            localStorage.setItem('wheelGifts', JSON.stringify(gifts));

            drawWheel();
            alert("تم حفظ التعديلات وتحديث العجلة بنجاح!");
        }

        // بدء تشغيل الحركة والدوران
        function spin() {
            if (isSpinning) return;

            const total = gifts.reduce((sum, g) => sum + g.probability, 0);
            if (total !== 100) {
                alert("يرجى التأكد من أن مجموع النسب في لوحة التحكم يساوي 100% قبل البدء.");
                return;
            }

            document.getElementById("result").innerText = "";
            isSpinning = true;
            spinBtn.disabled = true;

            const randomPick = Math.random() * 100;
            let currentSum = 0;
            let winningIndex = 0;

            for (let i = 0; i < gifts.length; i++) {
                currentSum += gifts[i].probability;
                if (randomPick <= currentSum) {
                    winningIndex = i;
                    break;
                }
            }

            let startAngleDegrees = 0;
            for (let i = 0; i < winningIndex; i++) {
                startAngleDegrees += (gifts[i].probability / 100) * 360;
            }
            const sliceAngleDegrees = (gifts[winningIndex].probability / 100) * 360;
            const centerOfSliceDegrees = startAngleDegrees + (sliceAngleDegrees / 2);

            const targetRotation = (360 - centerOfSliceDegrees) - 90;
            const extraSpins = 5 * 360; 
            currentRotation += extraSpins + targetRotation - (currentRotation % 360);

            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false;
                document.getElementById("result").innerText = `🎉 مبروك! فزت بـ: ${gifts[winningIndex].text}`;
            }, 4000);
        }

        // تشغيل أولي لعرض البيانات المحفوظة فور فتح الصفحة
        renderControlPanel();
        drawWheel();
    </script>
</body>
</html>
